<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>QRA Strategies</title>
    <script>
      // GitHub Pages SPA redirect: redirect 404s back to the index with the path encoded
      // as a query parameter, then the index.html script restores it.
      var segmentCount = 1; // number of path segments in the repo name (/qra-strategies-web)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
